name: Build NanoPi R2S Plus Matched Kernel
on: [push, workflow_dispatch]

jobs:
  build:
    runs-on: ubuntu-latest
    container:
      image: alpine:3.23 # Match the target branch
      options: --privileged
    steps:
      - name: Install Build Dependencies
        run: |
          apk add alpine-sdk sudo git bash bc perl elfutils-dev openssl-dev squashfs-tools mkinitfs
          adduser -D -G abuild builder
          echo "builder ALL=(ALL) NOPASSWD:ALL" >> /etc/sudoers
          sudo -u builder abuild-keygen -a -i -n

      - name: Checkout Your Repository
        uses: actions/checkout@v4

      - name: Checkout Aports (3.23-stable)
        run: |
          sudo -u builder git clone --depth 1 -b 3.23-stable \
            https://gitlab.alpinelinux.org/alpine/aports.git /home/builder/aports

      - name: Apply Custom Config and Patch
        run: |
          # Use your specific config from repo root
          sudo -u builder cp config-lts.aarch64 /home/builder/aports/main/linux-lts/config-lts.aarch64
          
          cd /home/builder/aports/main/linux-lts
          # Baking in the 'bridge' to the modloop: Loop, SD, SquashFS, and USB Storage
          SYMBOLS="I2C_RK3X PINCTRL_ROCKCHIP MFD_RK8XX MFD_RK8XX_I2C MFD_RK8XX_SPI REGULATOR_RK808 COMMON_CLK_RK808 RTC_DRV_RK808 ROCKCHIP_PM_DOMAINS MMC_DW MMC_DW_ROCKCHIP BLK_DEV_LOOP SQUASHFS SQUASHFS_XZ SQUASHFS_ZLIB BLK_DEV_SD USB_STORAGE EXT4_FS FAT_FS VFAT_FS"
          
          for sym in $SYMBOLS; do
            sudo -u builder sed -i "s/^.*CONFIG_$sym=.*$/CONFIG_$sym=y/" config-lts.aarch64
          done
          sudo -u builder abuild checksum

      - name: Compile Kernel and Install
        run: |
          cd /home/builder/aports/main/linux-lts
          sudo -u builder abuild -r
          # Install to /lib/modules so mkinitfs can find the NEW modules
          sudo apk add /home/builder/packages/main/aarch64/linux-lts-*.apk --allow-untrusted

      - name: Generate Matched Slim Initramfs
        run: |
          KVER=$(ls /lib/modules | grep "lts" | head -n 1)
          mkdir -p /home/builder/output/dtbs
          
          # We only need 'base' because storage/usb/loop are now INSIDE vmlinuz.
          # Network remains in the modloop to save initramfs space.
          sudo mkinitfs -F "base" -o /home/builder/output/initramfs-lts $KVER
          
          # Collect Artifacts
          find /home/builder/aports/main/linux-lts/src -name "vmlinuz" -exec cp {} /home/builder/output/vmlinuz-lts \;
          find /home/builder/packages/main/aarch64/ -name "modloop-lts-*" -exec cp {} /home/builder/output/modloop-lts \;
          find /home/builder/aports/main/linux-lts/src -name "rk3328-nanopi-r2s-plus.dtb" -exec cp {} /home/builder/output/dtbs/ \;

      - name: Upload Matched Boot Files
        uses: actions/upload-artifact@v4
        with:
          name: r2s-plus-matched-3.23
          path: /home/builder/output/
